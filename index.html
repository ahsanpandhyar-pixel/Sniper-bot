<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI NEURAL SNIPER v21.0</title>
    <style>
        :root { --neon: #00ff88; --danger: #ff4d4d; --bg: #05070a; --card: #0f1117; }
        body { background: var(--bg); color: #e1e1e1; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; text-align: center; }
        
        .header { background: var(--card); padding: 15px; border-radius: 15px; border-bottom: 2px solid var(--neon); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .timer { font-family: monospace; font-size: 22px; font-weight: bold; color: var(--neon); }

        /* Neural Signal Card */
        .main-card { background: var(--card); border: 2px solid #30363d; border-radius: 20px; padding: 30px; margin-bottom: 15px; position: relative; }
        .sig-val { font-size: 55px; font-weight: 900; margin: 10px 0; letter-spacing: -2px; }
        .ai-status { font-size: 10px; color: #8b949e; letter-spacing: 2px; text-transform: uppercase; }

        /* SMART TIME DURATION (Dark/Highlighter Logic) */
        .duration-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .time-box { background: #161b22; padding: 20px; border-radius: 15px; border: 2px solid #30363d; transition: 0.4s; opacity: 0.4; }
        .time-box.active { opacity: 1; border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,136,0.3); background: #1a1f29; }
        .time-box.active b { color: var(--neon); font-size: 24px; }
        .time-box span { display: block; font-size: 11px; color: #8b949e; margin-bottom: 5px; }

        /* Market Intel (The "Why" behind the trade) */
        .intel-box { background: #161b22; padding: 15px; border-radius: 15px; border-left: 4px solid var(--neon); text-align: left; margin-bottom: 20px; }
        .intel-row { font-size: 13px; margin-bottom: 5px; display: flex; justify-content: space-between; }

        .action-btn { width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; border-radius: 15px; font-weight: 900; font-size: 15px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,255,136,0.4); }
    </style>
</head>
<body>

<div class="header">
    <div><b style="font-size: 18px;">AI-QUANTUM <span style="color:var(--neon);">PRO</span></b></div>
    <div id="timer" class="timer">60s</div>
</div>

<div class="main-card" id="sig-card">
    <div class="ai-status">Neural Prediction Engine</div>
    <div id="signal" class="sig-val">SCANNING</div>
    <div id="acc" style="font-weight: bold; color: var(--neon);">BOOTING...</div>
</div>

<!-- SMART DURATION: Highlighted based on Trend Strength -->
<div class="duration-container">
    <div id="t1" class="time-box">
        <span>SHORT-TERM</span>
        <b>1 MIN</b>
    </div>
    <div id="t3" class="time-box">
        <span>CONTINUATION</span>
        <b>3 MIN</b>
    </div>
</div>

<div class="intel-box">
    <div class="intel-row"><span>CANDLE PATTERN:</span><b id="pattern">ANALYZING...</b></div>
    <div class="intel-row"><span>TREND STRENGTH:</span><b id="strength">--</b></div>
    <div class="intel-row"><span>SMC CONTEXT:</span><b id="context">SCANNING...</b></div>
</div>

<button class="action-btn" onclick="activateAI()">ACTIVATE NEURAL SENSORS ✅</button>

<audio id="beep" src="https://mixkit.co" preload="auto"></audio>

<script>
    let aiOn = false;

    function activateAI() {
        aiOn = true;
        document.getElementById('beep').play();
        alert("AI Neural Engine Active! Tracking every candle...");
    }

    function runAI() {
        const sigs = ["CALL ⬆️", "PUT ⬇️"];
        const patterns = ["Bullish Engulfing", "Pin Bar Rejection", "Doji Reversal", "Marubozu Strength"];
        const strengths = ["LOW (1m Only)", "MEDIUM (1m-2m)", "HIGH (1m-3m Focus)"];
        const contexts = ["OB Rejection", "FVG Filling", "Liquidity Grab", "Zone Breakout"];

        let s = sigs[Math.floor(Math.random() * sigs.length)];
        let p = patterns[Math.floor(Math.random() * patterns.length)];
        let c = contexts[Math.floor(Math.random() * contexts.length)];
        let strVal = Math.floor(Math.random() * 3); // 0, 1, or 2
        
        let color = s.includes("CALL") ? "#00ff88" : "#ff4d4d";
        
        // Dashboard Update
        document.getElementById('signal').innerText = s;
        document.getElementById('signal').style.color = color;
        document.getElementById('sig-card').style.borderColor = color;
        document.getElementById('acc').innerText = (Math.floor(Math.random() * 6) + 94) + "% CONFIDENCE";
        document.getElementById('pattern').innerText = p;
        document.getElementById('context').innerText = c;
        document.getElementById('strength').innerText = strengths[strVal];

        // SMART DURATION LOGIC (The "Highlighter")
        document.getElementById('t1').classList.remove('active');
        document.getElementById('t3').classList.remove('active');

        if (strVal === 0) {
            // Low strength: Only 1 min is active
            document.getElementById('t1').classList.add('active');
        } else {
            // Medium/High strength: Both 1 min and 3 min are active (Highlighted)
            document.getElementById('t1').classList.add('active');
            document.getElementById('t3').classList.add('active');
        }

        if (aiOn) {
            document.getElementById('beep').currentTime = 0;
            document.getElementById('beep').play();
            if (navigator.vibrate) navigator.vibrate(200);
        }
    }

    setInterval(() => {
        let sec = new Date().getSeconds();
        let timeLeft = 60 - sec;
        document.getElementById('timer').innerText = (timeLeft < 10 ? "0" : "") + timeLeft + "s";
        if (sec === 0) runAI();
    }, 1000);

    window.onload = runAI;
</script>
</body>
</html>
