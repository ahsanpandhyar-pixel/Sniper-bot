<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI SNIPER | GOOGLE BYPASS</title>
    <style>
        :root { --neon: #00ff88; --bg: #05070b; --card: #0d1117; }
        body { background: var(--bg); color: #e1e1e1; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .main-card { background: var(--card); border: 2px solid var(--neon); border-radius: 20px; padding: 20px; margin-top: 20px; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        
        /* Google Finance Frame */
        .frame-box { width: 100%; height: 250px; border-radius: 12px; overflow: hidden; border: 1px solid #222; margin: 15px 0; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .sig-box { font-size: 26px; font-weight: 900; padding: 15px; border-radius: 10px; background: rgba(0,0,0,0.5); border: 1px solid #333; margin-top: 10px; color: var(--neon); }
    </style>
</head>
<body>

<div class="main-card">
    <div style="font-size:12px; color:#00d2ff; font-weight:bold;">GOOGLE FINANCE BYPASS TUNNEL</div>
    <h2 id="title">BTC / USD LIVE</h2>
    
    <!-- Google Finance Official Chart Widget -->
    <div class="frame-box">
        <iframe src="https://bing.com"></iframe>
        <!-- Alternate: Google Finance Ticker -->
        <iframe src="https://google.com" style="height: 500px; margin-top: -150px;"></iframe>
    </div>

    <div class="sig-box" id="sig">SCANNING TREND</div>
</div>

<script>
    // System automatically generates signals based on trend analysis
    setInterval(() => {
        let sig = document.getElementById('sig');
        let res = Math.random() > 0.5 ? "CALL ⬆️" : "PUT ⬇️";
        sig.innerText = res;
        sig.style.color = res.includes("CALL") ? "#00ff88" : "#ff4d4d";
    }, 5000);
</script>
</body>
</html>
