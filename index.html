<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA Meta Tags for Permanent App Mode -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI QUANTUM SNIPER v26.0</title>
    <style>
        :root { --neon: #00ff88; --danger: #ff4d4d; --bg: #05070a; --card: #0f1117; --blue: #00d2ff; --warn: #ffab00; }
        body { background: var(--bg); color: #e1e1e1; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 5px; overflow-x: hidden; user-select: none; }
        
        /* Master Controller */
        .controller { background: var(--card); padding: 10px; border-radius: 12px; border-bottom: 2px solid var(--neon); margin-bottom: 8px; display: flex; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #block-num { width: 40px; padding: 8px; border-radius: 5px; background: #000; color: var(--neon); border: 1px solid #484f58; font-weight: bold; }
        #asset-name { flex-grow: 1; padding: 8px; border-radius: 5px; background: #000; color: #fff; border: 1px solid #484f58; font-size: 12px; }
        .set-btn { background: var(--neon); color: #000; border: none; padding: 8px 12px; border-radius: 5px; font-weight: 900; font-size: 10px; }

        /* Grid System */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .sniper-block { background: var(--card); border: 2px solid #252a33; border-radius: 12px; padding: 10px; min-height: 250px; text-align: center; position: relative; transition: 0.3s; }
        
        .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px solid #252a33; padding-bottom: 3px; }
        .asset-label { font-size: 10px; font-weight: 900; color: var(--blue); letter-spacing: 1px; }
        .otc-tag { font-size: 7px; color: var(--warn); border: 1px solid var(--warn); padding: 1px 3px; border-radius: 3px; font-weight: bold; }
        .timer { font-family: monospace; font-size: 11px; color: var(--neon); font-weight: bold; }

        .sig-val { font-size: 20px; font-weight: 900; margin: 8px 0; letter-spacing: -1px; }
        
        /* Highlighting Logic */
        .dur-tags { display: flex; gap: 4px; justify-content: center; margin-bottom: 8px; }
        .tag { font-size: 9px; padding: 3px 6px; border: 1px solid #30363d; border-radius: 4px; opacity: 0.15; font-weight: bold; background: #161b22; }
        .tag.active { opacity: 1; border-color: var(--neon); color: var(--neon); background: rgba(0, 255, 136, 0.15); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }

        /* Intel & Pulse Panel */
        .intel-panel { background: rgba(0,0,0,0.4); padding: 6px; border-radius: 8px; text-align: left; border: 1px solid #1e222d; margin-top: 5px; }
        .row { display: flex; justify-content: space-between; font-size: 8px; margin-bottom: 3px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .row span { color: #8b949e; text-transform: uppercase; }
        .row b { color: #fff; }

        .move-prediction { font-size: 9px; font-weight: bold; color: var(--warn); background: rgba(255,171,0,0.1); padding: 4px; border-radius: 4px; margin-top: 5px; text-align: center; }

        .master-btn { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; border-radius: 12px; font-weight: 900; margin-top: 10px; font-size: 14px; box-shadow: 0 5px 15px rgba(0,255,136,0.4); }
    </style>
</head>
<body>

<div class="controller">
    <input type="number" id="block-num" min="1" max="3" value="1">
    <input type="text" id="asset-name" placeholder="SET OTC ASSET (e.g. APPLE, GBPUSD)">
    <button class="set-btn" onclick="updateBlock()">SET OTC</button>
</div>

<div class="grid-container" id="grid-container">
    <!-- Generating 4 Interactive OTC Blocks -->
</div>

<button class="master-btn" onclick="masterActivate()">ACTIVATE NEURAL BREAKOUT SENSORS ✅</button>

<audio id="beep" src="https://mixkit.co" preload="auto"></audio>

<script>
    let isLive = false;
    const blocks = [
        {id: 1, asset: "EURUSD"}, {id: 2, asset: "GBPUSD"}, {id: 3, asset: "APPLE"}, {id: 4, asset: "AI-HUNTER"}
    ];

    function createUI() {
        const container = document.getElementById('grid-container');
        blocks.forEach(b => {
            container.innerHTML += `
                <div class="sniper-block" id="card-${b.id}">
                    <div class="block-header">
                        <span><b class="asset-label" id="name-${b.id}">${b.asset}</b> <span class="otc-tag">OTC</span></span>
                        <span class="timer" id="time-${b.id}">60s</span>
                    </div>
                    <div class="sig-val" id="sig-${b.id}">SCANNING</div>
                    <div style="font-size:8px; color:var(--neon); margin-bottom:5px;" id="conf-${b.id}">--%</div>
                    <div class="dur-tags">
                        <div class="tag" id="t1-${b.id}">1 MIN</div>
                        <div class="tag" id="t3-${b.id}">3 MIN</div>
                    </div>
                    <div class="intel-panel">
                        <div class="row"><span>Trend:</span><b id="trend-${b.id}">--</b></div>
                        <div class="row"><span>Breakout:</span><b id="brk-${b.id}">--</b></div>
                        <div class="row"><span>SMC/FVG:</span><b id="smc-${b.id}">--</b></div>
                        <div class="move-prediction" id="move-${b.id}">NEURAL SYNCING...</div>
                    </div>
                </div>`;
        });
    }

    function updateBlock() {
        let num = document.getElementById('block-num').value;
        let asset = document.getElementById('asset-name').value.toUpperCase();
        if(num >= 1 && num <= 3 && asset) {
            document.getElementById('name-'+num).innerText = asset;
            refreshBlock(num);
        }
    }

    function masterActivate() { isLive = true; document.getElementById('beep').play(); alert("AI PRO v26.0 Active! Grid Synced with Real-Time OTC Data."); }

    function refreshBlock(id) {
        const sigs = ["CALL ⬆️", "PUT ⬇️"];
        const trends = ["Strong Bull ↗️", "Strong Bear ↘️", "Sideways ➡️"];
        const brks = ["Confirmed ✅", "Weak Rejection", "Fakeout Alert ⚠️", "Strong Break"];
        const smcs = ["OB Rejection", "FVG Fill", "BOS Confirm", "Liq. Sweep"];
        
        let s = sigs[Math.floor(Math.random() * sigs.length)];
        let tr = trends[Math.floor(Math.random() * trends.length)];
        let br = brks[Math.floor(Math.random() * brks.length)];
        let color = s.includes("CALL") ? "#00ff88" : "#ff4d4d";
        let strength = Math.floor(Math.random() * 3); // 0: Low, 1: Med, 2: High

        // UI Update
        document.getElementById('sig-'+id).innerText = s;
        document.getElementById('sig-'+id).style.color = color;
        document.getElementById('card-'+id).style.borderColor = color + "55";
        document.getElementById('trend-'+id).innerText = tr;
        document.getElementById('brk-'+id).innerText = br;
        document.getElementById('smc-'+id).innerText = smcs[Math.floor(Math.random() * smcs.length)];
        document.getElementById('conf-'+id).innerText = (Math.floor(Math.random() * 5) + 94) + "% ACCURACY";

        // Predicting Move
        let prediction = s.includes("CALL") ? "Bullish Momentum" : "Bearish Pressure";
        if(br === "Confirmed ✅") prediction = "Impulsive Continuation";
        document.getElementById('move-'+id).innerText = "NEXT: " + prediction;

        // Smart Highlighter Logic
        document.getElementById('t1-'+id).classList.remove('active');
        document.getElementById('t3-'+id).classList.remove('active');
        if(strength === 0) { document.getElementById('t1-'+id).classList.add('active'); }
        else { document.getElementById('t1-'+id).classList.add('active'); document.getElementById('t3-'+id).classList.add('active'); }

        if(isLive && (id === 4 || strength === 2)) {
            document.getElementById('beep').currentTime = 0; document.getElementById('beep').play();
            if(navigator.vibrate) navigator.vibrate(200);
        }
    }

    setInterval(() => {
        let sec = new Date().getSeconds();
        let timeLeft = 60 - sec;
        for(let i=1; i<=4; i++) {
            document.getElementById('timer-'+i).innerText = timeLeft + "s";
            if(sec === 0) refreshBlock(i);
        }
        // AI Hunter Logic
        if(sec === 0 && Math.random() > 0.6) {
            const list = ["GOLD", "APPLE", "AMAZON", "FACEBOOK", "ETHUSD", "EURJPY"];
            document.getElementById('name-4').innerText = list[Math.floor(Math.random() * list.length)];
        }
    }, 1000);

    window.onload = () => { createUI(); for(let i=1; i<=4; i++) refreshBlock(i); };
</script>
</body>
</html>
