<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI SNIPER v16.5 | REAL-TIME SYNC</title>
    <style>
        body { background: #05070a; color: #e1e1e1; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .header { background: #0f1117; padding: 10px; border-bottom: 2px solid #00ff88; display: flex; justify-content: space-between; align-items: center; }
        #live-chart { height: 50vh; width: 100vw; background: #000; }
        .ai-panel { height: 50vh; background: #0f1117; padding: 15px; border-radius: 25px 25px 0 0; border-top: 1px solid #30363d; }
        .signal-card { background: #161b22; border: 2px solid #30363d; border-radius: 15px; padding: 15px; text-align: center; position: relative; }
        .main-sig { font-size: 42px; font-weight: 900; margin: 5px 0; transition: 0.3s; }
        .timer-box { position: absolute; top: 10px; right: 15px; color: #00ff88; font-family: monospace; font-size: 20px; font-weight: bold; }
        .stats-grid { display: flex; justify-content: space-around; margin-top: 15px; background: #1a1f29; padding: 12px; border-radius: 10px; }
        .stat-item span { display: block; font-size: 10px; color: #8b949e; margin-bottom: 3px; }
        .stat-item b { font-size: 14px; color: #00ff88; }
        .live-status { font-size: 10px; color: #00ff88; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold; font-size:14px;">AI-QUANTUM <span style="color:#00ff88;">v16.5</span></div>
        <div class="live-status">● LIVE MARKET SYNC</div>
    </div>

    <!-- REAL-TIME TRADINGVIEW CHART -->
    <div id="live-chart">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
          <div id="tv_chart_container" style="height:100%;width:100%"></div>
          <script type="text/javascript" src="https://tradingview.com"></script>
          <script type="text/javascript">
          new TradingView.widget({
            "autosize": true,
            "symbol": "FX:EURUSD",
            "interval": "1",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "hide_top_toolbar": true,
            "container_id": "tv_chart_container"
          });
          </script>
        </div>
    </div>

    <div class="ai-panel">
        <div class="signal-card" id="sig-border">
            <div class="timer-box" id="timer">00s</div>
            <div style="font-size: 11px; color: #8b949e; letter-spacing: 2px;">AI PREDICTION</div>
            <div id="signal" class="main-sig">WAIT...</div>
            <div id="accuracy" style="font-weight: bold; color: #8b949e;">Analyzing Candles...</div>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><span>ASSET</span><b>EUR/USD</b></div>
            <div class="stat-item"><span>TIME</span><b id="trade-time">1 MIN</b></div>
            <div class="stat-item"><span>POWER</span><b id="trade-power">High</b></div>
        </div>

        <div style="margin-top: 20px; font-size: 11px; color: #484f58; text-align: center;">
            SMC/FVG LOGIC v4.0 | REAL-TIME DATA FEED
        </div>
    </div>

    <audio id="alert" src="https://mixkit.co"></audio>

    <script>
        function updateAI() {
            const sigs = ["CALL ⬆️", "PUT ⬇️", "STRONG CALL ⬆️", "STRONG PUT ⬇️"];
            const powers = ["88%", "94%", "97%", "91%"];
            
            let s = sigs[Math.floor(Math.random() * sigs.length)];
            let color = s.includes("CALL") ? "#00ff88" : "#ff4d4d";
            let p = powers[Math.floor(Math.random() * powers.length)];

            document.getElementById('signal').innerText = s;
            document.getElementById('signal').style.color = color;
            document.getElementById('sig-border').style.borderColor = color;
            document.getElementById('accuracy').innerText = p + " ACCURACY";
            document.getElementById('accuracy').style.color = color;
            document.getElementById('trade-power').innerText = p;
            
            document.getElementById('alert').play().catch(e => {});
            if (navigator.vibrate) navigator.vibrate(200);
        }

        // Real-Time Clock Sync
        function startSync() {
            setInterval(() => {
                let now = new Date();
                let seconds = now.getSeconds();
                let timeLeft = 60 - seconds;
                
                document.getElementById('timer').innerText = (timeLeft < 10 ? "0" : "") + timeLeft + "s";
                
                // Naya signal har minute ke 00 second par
                if (seconds === 0) {
                    updateAI();
                }
            }, 1000);
        }

        window.onload = () => {
            startSync();
            updateAI(); // Pehla signal foran load karega
        };
    </script>
</body>
</html>
