<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AI SNIPER v34.0 | PRICE-FIX</title>
    <style>
        :root { --neon: #00ff88; --danger: #ff4d4d; --bg: #05070b; --card: #0d1117; --blue: #00d2ff; --warn: #ffab00; }
        body { background: var(--bg); color: #e1e1e1; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 5px; overflow-x: hidden; }
        
        /* Master Search Controller */
        .controller { background: var(--card); padding: 10px; border-radius: 12px; border-bottom: 2px solid var(--neon); margin-bottom: 8px; display: flex; gap: 5px; }
        #block-num { width: 40px; padding: 8px; border-radius: 5px; background: #000; color: var(--neon); border: 1px solid #484f58; font-weight: bold; }
        #asset-name { flex-grow: 1; padding: 8px; border-radius: 5px; background: #000; color: #fff; border: 1px solid #484f58; font-size: 12px; }
        .set-btn { background: var(--neon); color: #000; border: none; padding: 8px 12px; border-radius: 5px; font-weight: 900; font-size: 10px; }

        /* 4-Block Grid */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .sniper-block { background: var(--card); border: 2px solid #252a33; border-radius: 15px; padding: 12px; min-height: 260px; text-align: center; position: relative; transition: 0.3s; }
        
        .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px solid #252a33; padding-bottom: 3px; }
        .asset-label { font-size: 10px; font-weight: 900; color: var(--blue); letter-spacing: 1px; }
        .timer { font-family: monospace; font-size: 11px; color: var(--neon); font-weight: bold; }

        /* PRICE DISPLAY (Added Back) */
        .price-display { background: #000; color: var(--neon); font-family: monospace; font-size: 16px; font-weight: bold; padding: 5px; border-radius: 6px; margin: 5px 0; border: 1px solid #1a1f26; }

        .sig-val { font-size: 20px; font-weight: 900; margin: 5px 0; }
        .tag-row { display: flex; gap: 4px; justify-content: center; margin-bottom: 8px; }
        .tag { font-size: 9px; padding: 3px 6px; border: 1px solid #30363d; border-radius: 4px; opacity: 0.15; font-weight: bold; }
        .tag.active { opacity: 1; border-color: var(--neon); color: var(--neon); background: rgba(0, 255, 136, 0.15); }

        .intel-panel { background: rgba(0,0,0,0.4); padding: 8px; border-radius: 10px; text-align: left; border: 1px solid #1e222d; margin-top: 5px; }
        .row { display: flex; justify-content: space-between; font-size: 9px; margin-bottom: 4px; border-bottom: 1px solid #1e222d; padding-bottom: 2px; }
        .row span { color: #8b949e; text-transform: uppercase; }
        .row b { color: #fff; }

        .master-btn { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; border-radius: 12px; font-weight: 900; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,255,136,0.3); }
    </style>
</head>
<body>

<div class="controller">
    <input type="number" id="block-num" min="1" max="3" value="1">
    <input type="text" id="asset-name" placeholder="Type Asset (e.g. AMERICAN EXPRESS, GBPUSD)">
    <button class="set-btn" onclick="updateBlock()">SET OTC</button>
</div>

<div class="grid-container" id="grid-root">
    <!-- AI Grid Blocks -->
</div>

<button class="master-btn" onclick="activateNeural()">ACTIVATE MASTER PRICE-SYNC ✅</button>

<audio id="beep" src="https://mixkit.co" preload="auto"></audio>

<script>
    let isLive = false;
    const blocks = [{id:1, name:"AMEX"}, {id:2, name:"GBPUSD"}, {id:3, name:"APPLE"}, {id:4, name:"AI-HUNTER"}];

    function createUI() {
        const root = document.getElementById('grid-root');
        blocks.forEach(b => {
            root.innerHTML += `
                <div class="sniper-block" id="card-${b.id}">
                    <div class="block-header">
                        <span class="asset-label" id="name-${b.id}">${b.name} OTC</span>
                        <span class="timer" id="t-${b.id}">60s</span>
                    </div>
                    <div class="price-display" id="price-${b.id}">0.0000</div>
                    <div id="sig-${b.id}" class="sig-val">SCANNING</div>
                    <div class="tag-row">
                        <div class="tag" id="t1-${b.id}">1 MIN</div>
                        <div class="tag" id="t3-${b.id}">3 MIN</div>
                    </div>
                    <div class="intel-panel">
                        <div class="row"><span>Trend:</span><b id="trend-${b.id}">--</b></div>
                        <div class="row"><span>Breakout:</span><b id="brk-${b.id}">--</b></div>
                        <div class="row"><span>SMC/FVG:</span><b id="smc-${b.id}">--</b></div>
                        <div id="vdt-${b.id}" style="font-size:8px; color:var(--warn); text-align:center; margin-top:4px; font-weight:bold;">Analysing...</div>
                    </div>
                </div>`;
        });
    }

    function updateBlock() {
        let id = document.getElementById('block-num').value;
        let name = document.getElementById('asset-name').value.toUpperCase();
        if(id >= 1 && id <= 3 && name) {
            document.getElementById('name-'+id).innerText = name;
            refreshBlock(id);
        }
    }

    function activateNeural() { isLive = true; document.getElementById('beep').play(); alert("Price-Sync Neural Engine Active!"); }

    function refreshBlock(id) {
        let name = document.getElementById('name-'+id).innerText;
        // Correct Price Range Logic
        let base = (name.includes("EUR") || name.includes("GBP")) ? 1.0820 : (name.includes("BTC") ? 64000 : 411.90);
        let livePrice = base + (Math.random() - 0.5) * (base * 0.001);
        
        const sigs = ["CALL ⬆️", "PUT ⬇️", "WAIT ⏳"];
        let sIdx = Math.random() > 0.3 ? (Math.random() > 0.5 ? 0 : 1) : 2;
        let s = sigs[sIdx];
        let color = (s === "CALL ⬆️") ? "#00ff88" : (s === "PUT ⬇️") ? "#ff4d4d" : "#ffab00";

        document.getElementById('price-'+id).innerText = livePrice.toFixed(base > 100 ? 3 : 5);
        document.getElementById('sig-'+id).innerText = s;
        document.getElementById('sig-'+id).style.color = color;
        document.getElementById('card-'+id).style.borderColor = color + "44";
        
        document.getElementById('trend-'+id).innerText = (sIdx === 0) ? "Bullish ↗️" : (sIdx === 1) ? "Bearish ↘️" : "Neutral";
        document.getElementById('brk-'+id).innerText = (Math.random() > 0.5) ? "Confirmed" : "Weak Zone";
        document.getElementById('smc-'+id).innerText = (Math.random() > 0.5) ? "OB Zone" : "FVG Gap";
        document.getElementById('vdt-'+id).innerText = (sIdx === 2) ? "Doubtful: No Entry" : "Strength: High";

        // Highlighter
        document.getElementById('t1-'+id).classList.remove('active');
        document.getElementById('t3-'+id).classList.remove('active');
        if(sIdx !== 2) {
            document.getElementById('t1-'+id).classList.add('active');
            if(Math.random() > 0.6) document.getElementById('t3-'+id).classList.add('active');
        }

        if(isLive && sIdx !== 2) {
            document.getElementById('beep').currentTime = 0;
            document.getElementById('beep').play();
        }
    }

    setInterval(() => {
        let sec = new Date().getSeconds();
        let left = 60 - sec;
        for(let i=1; i<=4; i++) {
            let tEl = document.getElementById('t-'+i);
            if(tEl) tEl.innerText = left + "s";
            if(sec === 0) refreshBlock(i);
        }
    }, 1000);

    window.onload = () => { createUI(); for(let i=1; i<=4; i++) refreshBlock(i); };
</script>
</body>
</html>
