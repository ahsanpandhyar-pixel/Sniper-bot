<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AI QUANTUM SNIPER v33.0 | INFINITY</title>
    <style>
        :root { --neon: #00ff88; --danger: #ff4d4d; --bg: #030508; --card: #0d1117; --blue: #00d2ff; --warn: #ffab00; }
        body { background: var(--bg); color: #e1e1e1; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 8px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Glassmorphism Header */
        .header { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(10px); padding: 12px; border-radius: 15px; border: 1px solid rgba(0, 255, 136, 0.3); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
        .timer-main { font-family: 'Courier New', monospace; font-size: 22px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .search-bar { display: flex; gap: 6px; margin-bottom: 10px; }
        input { flex: 1; background: #000; border: 1px solid #333; border-radius: 8px; padding: 12px; color: var(--neon); font-weight: bold; font-size: 14px; }
        .s-btn { background: var(--neon); color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: 900; }

        /* Multi-Block Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .block { background: var(--card); border: 1px solid #21262d; border-radius: 18px; padding: 12px; position: relative; min-height: 270px; text-align: center; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .block.win-state { border-color: var(--neon); box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.1); }
        
        .asset-h { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; color: var(--blue); margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .sig-large { font-size: 26px; font-weight: 900; margin: 10px 0; text-transform: uppercase; }
        
        /* Smart Highlighting Duration */
        .dur-row { display: flex; gap: 4px; justify-content: center; margin-bottom: 10px; }
        .tag { font-size: 9px; padding: 4px 8px; border: 1px solid #333; border-radius: 6px; opacity: 0.1; font-weight: bold; background: #161b22; }
        .tag.on { opacity: 1; border-color: var(--neon); color: var(--neon); background: rgba(0, 255, 136, 0.15); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }

        /* Neural Intel Panel */
        .intel-p { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 12px; text-align: left; border: 1px solid #222; }
        .i-row { display: flex; justify-content: space-between; font-size: 9px; margin-bottom: 5px; border-bottom: 1px solid #1a1f26; padding-bottom: 3px; }
        .i-row span { color: #8b949e; }
        .i-row b { color: #fff; }

        .ai-verdict { font-size: 10px; font-weight: bold; background: rgba(255,171,0,0.1); color: var(--warn); padding: 5px; border-radius: 6px; margin-top: 8px; text-transform: uppercase; border: 1px solid rgba(255,171,0,0.2); }

        .master-btn { width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; border-radius: 15px; font-weight: 900; font-size: 16px; margin-top: 15px; box-shadow: 0 10px 30px rgba(0,255,136,0.3); letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 900; font-size: 18px; letter-spacing: 1px;">SNIPER <span style="color:var(--neon);">INFINITY</span></div>
    <div id="m-timer" class="timer-main">60s</div>
</div>

<div class="search-bar">
    <input type="text" id="s-input" placeholder="SEARCH OTC (e.g. APPLE, GBPUSD)">
    <button class="s-btn" onclick="setAsset()">SCAN</button>
</div>

<div class="grid" id="g-root"></div>

<button class="master-btn" onclick="startInfinity()">DEPLOY NEURAL INFINITY ENGINE ✅</button>

<audio id="snd" src="https://mixkit.co"></audio>

<script>
    let active = false;
    let mainAsset = "EURUSD";
    const blocks =;

    function initUI() {
        const root = document.getElementById('g-root');
        blocks.forEach(id => {
            root.innerHTML += `
                <div class="block" id="blk-${id}">
                    <div class="asset-h">
                        <span id="name-${id}">${id === 4 ? 'AI HUNTER' : mainAsset}</span>
                        <span style="color:var(--warn)">OTC SYNC</span>
                    </div>
                    <div id="sig-${id}" class="sig-large">WAITING</div>
                    <div style="font-size:9px; color:var(--neon); margin-bottom:8px; font-weight:bold;" id="acc-${id}">ANALYZING...</div>
                    <div class="dur-row">
                        <div class="tag" id="tag1-${id}">1 MIN</div>
                        <div class="tag" id="tag3-${id}">3 MIN</div>
                    </div>
                    <div class="intel-p">
                        <div class="i-row"><span>VOLUME:</span><b id="vol-${id}">--</b></div>
                        <div class="i-row"><span>SMC ZONE:</span><b id="smc-${id}">--</b></div>
                        <div class="i-row"><span>STRUCTURE:</span><b id="brk-${id}">--</b></div>
                        <div class="ai-verdict" id="vdt-${id}">Scanning Liquidity...</div>
                    </div>
                </div>`;
        });
    }

    function setAsset() {
        let val = document.getElementById('s-input').value.toUpperCase();
        if(val) { mainAsset = val; for(let i=1; i<=3; i++) { document.getElementById('name-'+i).innerText = val; processAI(i); } }
    }

    function startInfinity() { active = true; document.getElementById('snd').play(); alert("INFINITY ENGINE DEPLOYED. Accuracy Calibrated to 98.8%."); }

    function processAI(id) {
        const signals = ["CALL ⬆️", "PUT ⬇️", "NO TRADE ⏳"];
        const zones = ["Order Block", "FVG Gap", "Breaker Block", "Liquidity"];
        const trends = ["Strong Bullish", "Strong Bearish", "Ranging", "Fake-out"];
        
        let dice = Math.random();
        let sIdx = dice > 0.3 ? (Math.random() > 0.5 ? 0 : 1) : 2;
        let s = signals[sIdx];
        let color = s === "CALL ⬆️" ? "#00ff88" : s === "PUT ⬇️" ? "#ff4d4d" : "#8b949e";
        
        document.getElementById('sig-'+id).innerText = s;
        document.getElementById('sig-'+id).style.color = color;
        document.getElementById('acc-'+id).innerText = (Math.floor(Math.random() * 4) + 95) + "% ACCURACY";
        document.getElementById('vol-'+id).innerText = (Math.floor(Math.random() * 40) + 60) + "%";
        document.getElementById('smc-'+id).innerText = zones[Math.floor(Math.random() * 4)];
        document.getElementById('brk-'+id).innerText = trends[Math.floor(Math.random() * 4)];

        let verdict = document.getElementById('vdt-'+id);
        if(sIdx === 2) {
            verdict.innerText = "RISK: HIGH MANIPULATION";
            verdict.style.color = "#ffab00";
        } else {
            verdict.innerText = "CONFIRMED: " + (sIdx === 0 ? "BUY" : "SELL") + " PRESSURE";
            verdict.style.color = color;
        }

        // SMART HIGHLIGHTING
        document.getElementById('tag1-'+id).classList.remove('on');
        document.getElementById('tag3-'+id).classList.remove('on');
        if(sIdx !== 2) {
            document.getElementById('tag1-'+id).classList.add('on');
            if(dice > 0.6) document.getElementById('tag3-'+id).classList.add('on');
        }

        if(active && sIdx !== 2) {
            document.getElementById('snd').currentTime = 0; document.getElementById('snd').play();
            if(navigator.vibrate) navigator.vibrate(200);
        }
    }

    setInterval(() => {
        let sec = new Date().getSeconds();
        let left = 60 - sec;
        document.getElementById('m-timer').innerText = left + "s";
        if(sec === 0) { for(let i=1; i<=4; i++) processAI(i); }
    }, 1000);

    window.onload = () => { initUI(); for(let i=1; i<=4; i++) processAI(i); };
</script>
</body>
</html>
