<script>
    const KEY = 'd7rir1pr01qgahvdpft0d7rir1pr01qgahvdpftg';
    let isLive = false;
    let sockets = {};
    let lastPrices = {};

    function activate() {
        isLive = true;
        document.getElementById('act-btn').innerText = "SYSTEM ONLINE ✅";
        document.getElementById('act-btn').style.background = "#00d2ff";
        
        // Pehle se mojud pairs ko connect karein
        const initialPairs = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT"];
        initialPairs.forEach((sym, i) => startStreaming(i + 1, sym));
    }

    function startStreaming(id, symbol) {
        if(sockets[id]) sockets[id].close();

        // WebSocket use kar rahe hain takay data foran aaye
        sockets[id] = new WebSocket(`wss://ws.finnhub.io?token=${KEY}`);

        sockets[id].onopen = () => {
            sockets[id].send(JSON.stringify({'type':'subscribe', 'symbol': `BINANCE:${symbol}`}));
        };

        sockets[id].onmessage = (event) => {
            const res = JSON.parse(event.data);
            if(res.type === 'trade') {
                const data = res.data[0];
                const price = data.p;
                const time = data.t;

                // Update UI
                document.getElementById(`p-${id}`).innerText = price.toFixed(2);
                processLogic(id, price);
            }
        };

        sockets[id].onerror = () => {
            document.getElementById(`p-${id}`).innerText = "RECONNECTING...";
        };
    }

    function processLogic(id, currentP) {
        let sig = document.getElementById(`sig-${id}`);
        let oldP = lastPrices[id] || currentP;
        let diff = currentP - oldP;

        // Continuity & Pattern Logic
        if (Math.abs(diff) > (currentP * 0.0001)) { // Sensitivity Filter
            let isUp = diff > 0;
            sig.innerText = isUp ? "CALL ⬆️" : "PUT ⬇️";
            sig.style.color = isUp ? "var(--neon)" : "var(--danger)";
            
            document.getElementById(`t1-${id}`).className = "tab active";
            document.getElementById(`t3-${id}`).className = "tab active";
            
            // Expiry Calc (3 mins)
            let expTime = new Date(Date.now() + 3 * 60000);
            document.getElementById(`exp-${id}`).innerText = "EXPIRY: " + expTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            document.getElementById(`pat-${id}`).innerText = "MOMENTUM CONFIRMED";
            document.getElementById(`smc-${id}`).innerText = isUp ? "BULLISH BREAKOUT" : "BEARISH SWEEP";
            document.getElementById(`sr-${id}`).innerText = isUp ? "STRONG BUY" : "STRONG SELL";
            
            document.getElementById('beep').play();
        } else {
            // Agar price stagnant hai toh status scan par rakhein
            if(!sig.innerText.includes("CALL") && !sig.innerText.includes("PUT")) {
                sig.innerText = "SCANNING...";
                sig.style.color = "#444";
            }
        }
        lastPrices[id] = currentP;
    }

    function updateAsset() {
        let id = document.getElementById('b-id').value;
        let sym = document.getElementById('b-sym').value.toUpperCase().trim();
        if(sym && id <= 4) {
            document.getElementById(`n-${id}`).innerText = sym;
            startStreaming(id, sym);
        }
    }
</script>
