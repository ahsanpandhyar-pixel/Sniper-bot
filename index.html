<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI SNIPER v34.0 | SMC TERMINAL</title>
    <style>
        :root { --neon: #00ff88; --bg: #05070b; --card: #0d1117; --danger: #ff4d4d; --blue: #00d2ff; --warn: #ffab00; }
        body { background: var(--bg); color: #e1e1e1; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .header { background: var(--card); padding: 12px; border-radius: 15px; border-bottom: 2px solid var(--neon); display: flex; gap: 8px; margin-bottom: 12px; }
        input { background: #000; border: 1px solid #333; color: var(--neon); padding: 10px; border-radius: 8px; flex-grow: 1; outline: none; font-weight: bold; }
        .btn { background: var(--neon); border: none; font-weight: 900; padding: 10px 15px; border-radius: 8px; cursor: pointer; }

        .main-card { background: var(--card); border: 2px solid #1a1f26; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .price { font-family: monospace; font-size: 42px; font-weight: 900; color: var(--neon); margin: 10px 0; text-shadow: 0 0 15px rgba(0,255,136,0.2); }
        
        .signal-banner { font-size: 26px; font-weight: 900; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid #333; margin: 15px 0; }
        
        .intel-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .intel-box { background: rgba(255,255,255,0.03); border: 1px solid #222; padding: 10px; border-radius: 10px; text-align: left; }
        .label { font-size: 10px; color: var(--blue); font-weight: 900; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .val { font-size: 13px; font-weight: bold; color: #fff; font-family: monospace; }

        .ai-hunter { margin-top: 15px; background: linear-gradient(90deg, #0d1117, #161b22); border-left: 4px solid var(--blue); padding: 15px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="asset-in" placeholder="ENTER ASSET (e.g. BTCUSDT)">
    <button class="btn" onclick="startTerminal()">SYNC LIVE</button>
</div>

<div class="main-card">
    <div style="font-size:12px; color:var(--blue); font-weight:900;" id="asset-label">MASTER TERMINAL READY</div>
    <div class="price" id="p-val">0.00</div>
    
    <div id="sig-display" class="signal-banner" style="color:#444">SCANNING MARKET</div>

    <div class="intel-section">
        <div class="intel-box"><span class="label">Structure (BOS)</span><b class="val" id="v-bos">ANALYZING</b></div>
        <div class="intel-box"><span class="label">Fair Value Gap</span><b class="val" id="v-fvg">WAITING</b></div>
        <div class="intel-box"><span class="label">Support Level</span><b class="val" id="v-sup">--.---</b></div>
        <div class="intel-box"><span class="label">Resistance</span><b class="val" id="v-res">--.---</b></div>
        <div class="intel-box"><span class="label">Trend Strength</span><b class="val" id="v-trend">STABLE</b></div>
        <div class="intel-box"><span class="label">Volume 24h</span><b class="val" id="v-vol">--</b></div>
    </div>
</div>

<div class="ai-hunter">
    <span style="color:var(--blue); font-weight:bold;">🛰️ AI-HUNTER v34:</span> 
    <span id="h-msg">Waiting for system initialization...</span>
</div>

<audio id="beep" src="https://mixkit.co"></audio>

<script>
    let ws = null;
    let lastP = 0;

    function startTerminal() {
        let sym = document.getElementById('asset-in').value.toLowerCase() || 'btcusdt';
        if(!sym.includes('usdt')) sym += 'usdt';
        
        document.getElementById('asset-label').innerText = sym.toUpperCase() + " | REAL-TIME SMC DATA";
        
        if(ws) ws.close();
        ws = new WebSocket(`wss://://binance.com{sym}@ticker`);

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const p = parseFloat(data.c);
            document.getElementById('p-val').innerText = p.toFixed(p > 100 ? 2 : 5);
            
            // SMC Level Calculations
            document.getElementById('v-sup').innerText = parseFloat(data.l).toFixed(2);
            document.getElementById('v-res').innerText = parseFloat(data.h).toFixed(2);
            document.getElementById('v-vol').innerText = (parseFloat(data.v) / 1000).toFixed(1) + "K";

            let diff = p - lastP;
            if(lastP !== 0 && Math.abs(diff) > (p * 0.00005)) {
                updateSignal(diff, p);
            }
            lastP = p;
        };
    }

    function updateSignal(diff, p) {
        let sig = document.getElementById('sig-display');
        let isUp = diff > 0;
        
        sig.innerText = isUp ? "CALL ⬆️ (STRONG)" : "PUT ⬇️ (STRONG)";
        sig.style.color = isUp ? "var(--neon)" : "var(--danger)";
        
        document.getElementById('v-bos').innerText = isUp ? "BULLISH BREAKOUT" : "BEARISH BREAKOUT";
        document.getElementById('v-fvg').innerText = isUp ? "GAP AT " + (p*0.999).toFixed(2) : "GAP AT " + (p*1.001).toFixed(2);
        document.getElementById('v-trend').innerText = isUp ? "UPWARD 88%" : "DOWNWARD 92%";
        
        document.getElementById('h-msg').innerText = "Momentum confirmed. Look for re-entry at FVG level.";
        document.getElementById('beep').play();
    }
</script>
</body>
</html>
