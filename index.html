<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI SNIPER | FINAL TERMINAL</title>
    <style>
        :root { --neon: #00ff88; --bg: #05070b; --card: #0d1117; --danger: #ff4d4d; --blue: #00d2ff; --warn: #ffab00; }
        body { background: var(--bg); color: #e1e1e1; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .header { background: var(--card); padding: 12px; border-radius: 15px; border-bottom: 2px solid var(--neon); display: flex; gap: 8px; margin-bottom: 10px; }
        input { background: #000; border: 1px solid #333; color: var(--neon); padding: 10px; border-radius: 8px; flex-grow: 1; outline: none; font-weight: bold; }
        .btn { background: var(--neon); border: none; font-weight: 900; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .main-terminal { background: var(--card); border: 2px solid #1a1f26; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 10px; }
        .price { font-family: monospace; font-size: 38px; font-weight: 900; color: var(--neon); margin: 15px 0; }
        .signal-box { font-size: 28px; font-weight: 900; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid #333; margin: 10px 0; }
        .tabs { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
        .tab { padding: 5px 15px; border: 1px solid #333; border-radius: 6px; font-size: 12px; color: #444; font-weight: bold; }
        .tab.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,136,0.1); }
        .intel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; margin-top: 15px; }
        .row { border-bottom: 1px solid #1e222d; padding: 5px 0; display: flex; justify-content: space-between; font-size: 11px; }
        .row b { color: #fff; }
        .ai-hunter { background: linear-gradient(145deg, #0d1117, #1a1f26); border-left: 4px solid var(--blue); padding: 15px; border-radius: 12px; }
        .start-btn { width: 100%; padding: 20px; background: var(--blue); color: #000; border: none; border-radius: 12px; font-weight: 900; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,210,255,0.3); cursor: pointer; }
    </style>
</head>
<body>

<button class="start-btn" id="master-start" onclick="initSystem()">INITIALIZE LIVE CONNECTION 🚀</button>

<div class="header">
    <input type="text" id="symbol-input" placeholder="Type BTC or ETH">
    <button class="btn" onclick="manualSearch()">SEARCH</button>
</div>

<div class="main-terminal">
    <div style="font-size:14px; color:var(--blue); font-weight:900;" id="main-sym">TERMINAL READY</div>
    <div class="price" id="main-price">0.00</div>
    <div class="tabs">
        <div class="tab" id="t1">1 MIN</div>
        <div class="tab" id="t3">3 MIN</div>
    </div>
    <div id="main-sig" class="signal-box" style="color:#333">OFFLINE</div>
    <div style="font-size:12px; color:var(--warn); font-weight:bold;" id="main-exp">EXPIRY: --:--</div>
    
    <div class="intel-grid">
        <div class="row"><span>Pattern:</span><b id="main-pat">--</b></div>
        <div class="row"><span>SMC/FVG:</span><b id="main-smc">--</b></div>
        <div class="row"><span>Trend:</span><b id="main-trend">--</b></div>
        <div class="row"><span>Accuracy:</span><b id="main-acc">--</b></div>
    </div>
</div>

<div class="ai-hunter">
    <div style="font-size:10px; font-weight:bold; color:var(--blue);">🛰️ AI-HUNTER v34</div>
    <div id="hunter-text" style="font-size:13px;">Waiting for system start...</div>
</div>

<audio id="beep" src="https://mixkit.co"></audio>

<script>
    let ws = null;
    let lastPrice = 0;

    function initSystem() {
        document.getElementById('master-start').style.display = 'none';
        connect('btcusdt');
    }

    function manualSearch() {
        let sym = document.getElementById('symbol-input').value.toLowerCase().trim();
        if(!sym) return;
        if(!sym.includes('usdt')) sym += 'usdt';
        connect(sym);
    }

    function connect(symbol) {
        if(ws) ws.close();
        document.getElementById('main-sym').innerText = symbol.toUpperCase() + " ACTIVE";
        
        ws = new WebSocket(`wss://://binance.com{symbol}@trade`);

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const p = parseFloat(data.p);
            document.getElementById('main-price').innerText = p.toFixed(p > 100 ? 2 : 4);
            
            let diff = p - lastPrice;
            if (Math.abs(diff) > (p * 0.00005)) {
                let isUp = diff > 0;
                let sig = document.getElementById('main-sig');
                sig.innerText = isUp ? "CALL ⬆️" : "PUT ⬇️";
                sig.style.color = isUp ? "var(--neon)" : "var(--danger)";
                
                document.getElementById('t1').className = "tab active";
                document.getElementById('t3').className = "tab active";
                
                let exp = new Date(Date.now() + 3 * 60000);
                document.getElementById('main-exp').innerText = "EXPIRY: " + exp.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                document.getElementById('main-pat').innerText = "STRONG MOMENTUM";
                document.getElementById('main-smc').innerText = isUp ? "BULLISH BOS" : "BEARISH SWEEP";
                document.getElementById('main-acc').innerText = "94.2%";
                document.getElementById('main-trend').innerText = isUp ? "BUYING" : "SELLING";
                document.getElementById('beep').play();
            }
            lastPrice = p;
            
            // Hunter Simulation
            if(Math.random() > 0.99) {
                document.getElementById('hunter-text').innerText = "New Setup Found on ETH/USDT: BUY ⬆️";
            }
        };

        ws.onerror = () => { document.getElementById('main-price').innerText = "ERR: REFRESH"; };
    }
</script>
</body>
</html>
