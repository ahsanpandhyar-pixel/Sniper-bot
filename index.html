<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI SNIPER | ULTIMATE TERMINAL</title>
    <style>
        :root { --neon: #00ff88; --bg: #05070b; --card: #0d1117; --danger: #ff4d4d; --blue: #00d2ff; }
        body { background: var(--bg); color: #e1e1e1; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .header { background: var(--card); padding: 12px; border-radius: 15px; border-bottom: 2px solid var(--neon); display: flex; gap: 8px; margin-bottom: 10px; }
        input { background: #000; border: 1px solid #333; color: var(--neon); padding: 10px; border-radius: 8px; flex-grow: 1; outline: none; font-weight: bold; }
        .btn { background: var(--neon); border: none; font-weight: 900; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .main-terminal { background: var(--card); border: 2px solid #1a1f26; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 10px; }
        
        /* TradingView Widget Styling */
        .price-area { min-height: 60px; margin: 15px 0; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        
        .signal-box { font-size: 28px; font-weight: 900; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid #333; margin: 10px 0; color: #444; }
        .tabs { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
        .tab { padding: 5px 15px; border: 1px solid #333; border-radius: 6px; font-size: 12px; color: #444; font-weight: bold; }
        .tab.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,136,0.1); }
        .intel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; margin-top: 15px; }
        .row { border-bottom: 1px solid #1e222d; padding: 5px 0; display: flex; justify-content: space-between; font-size: 11px; }
        .row b { color: #fff; }
        .ai-hunter { background: linear-gradient(145deg, #0d1117, #1a1f26); border-left: 4px solid var(--blue); padding: 15px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="asset-input" placeholder="Type BTCUSDT or ETHUSDT">
    <button class="btn" onclick="searchAsset()">SEARCH</button>
</div>

<div class="main-terminal">
    <div style="font-size:14px; color:var(--blue); font-weight:900;" id="main-sym">LIVE MARKET TERMINAL</div>
    
    <!-- Real-time Price from TradingView Widget -->
    <div class="price-area" id="price-widget">
        <!-- Default BTCUSDT Ticker -->
        <div class="tradingview-widget-container">
            <iframe scrolling="no" allowtransparency="true" frameborder="0" src="https://tradingview-widget.com" style="box-sizing: border-box; height: 100%; width: 100%;"></iframe>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active">1 MIN</div>
        <div class="tab active">3 MIN</div>
    </div>
    
    <div id="main-sig" class="signal-box">ANALYZING...</div>
    
    <div class="intel-grid">
        <div class="row"><span>Status:</span><b>LIVE SYNC</b></div>
        <div class="row"><span>Market:</span><b id="mkt-type">BINANCE</b></div>
        <div class="row"><span>SMC/FVG:</span><b>DETECTING</b></div>
        <div class="row"><span>Trend:</span><b>STRONG</b></div>
    </div>
</div>

<div class="ai-hunter">
    <div style="font-size:10px; font-weight:bold; color:var(--blue);">🛰️ AI-HUNTER v34</div>
    <div id="hunter-text" style="font-size:13px;">Auto-scanning global pairs...</div>
</div>

<script>
    function searchAsset() {
        let sym = document.getElementById('asset-input').value.toUpperCase().trim();
        if(!sym) return;
        if(!sym.includes('USDT') && !sym.includes('BTC')) sym += 'USDT';
        
        // Update Price Widget Dynamically
        document.getElementById('price-widget').innerHTML = `
            <div class="tradingview-widget-container">
                <iframe scrolling="no" allowtransparency="true" frameborder="0" src="https://tradingview-widget.com{sym}&theme=dark&locale=en" style="box-sizing: border-box; height: 100%; width: 100%;"></iframe>
            </div>`;
        
        document.getElementById('main-sym').innerText = sym + " TERMINAL";
        document.getElementById('main-sig').innerText = "CALCULATING...";
        
        // Signal logic simulation for high accuracy feel
        setTimeout(() => {
            let rand = Math.random();
            let sig = document.getElementById('main-sig');
            if(rand > 0.5) {
                sig.innerText = "CALL ⬆️"; sig.style.color = "#00ff88";
            } else {
                sig.innerText = "PUT ⬇️"; sig.style.color = "#ff4d4d";
            }
        }, 2000);
    }

    // AI Hunter logic
    setInterval(() => {
        const pairs = ["ETHUSDT", "SOLUSDT", "XRPUSDT", "ADAUSDT"];
        let p = pairs[Math.floor(Math.random()*pairs.length)];
        document.getElementById('hunter-text').innerText = `Setup Detected on ${p} | Potential Move Imminent!`;
    }, 5000);
</script>
</body>
</html>
