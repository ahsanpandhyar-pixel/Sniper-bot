<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI SNIPER | NO-FAIL VERSION</title>
    <style>
        :root { --neon: #00ff88; --bg: #000; --card: #0d1117; }
        body { background: var(--bg); color: #e1e1e1; font-family: sans-serif; margin: 0; overflow: hidden; }
        .nav { background: var(--card); padding: 8px; display: flex; gap: 5px; border-bottom: 2px solid var(--neon); height: 50px; align-items: center; box-sizing: border-box; }
        input { background: #111; border: 1px solid #333; color: var(--neon); padding: 8px; border-radius: 5px; flex-grow: 1; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 4px; height: calc(100vh - 50px); box-sizing: border-box; }
        .block { background: var(--card); border-radius: 8px; border: 1px solid #1a1f26; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }
        .sig { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 5px; font-weight: 900; font-size: 12px; color: var(--neon); z-index: 10; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div class="nav">
    <input type="number" id="b-id" value="1" style="max-width:35px">
    <input type="text" id="b-sym" placeholder="BTCUSDT">
    <button onclick="updateAsset()" style="background:var(--neon); border:none; padding:8px 12px; border-radius:5px; font-weight:bold;">SET</button>
</div>

<div class="grid" id="main-grid">
    <div class="block" id="box-1"></div>
    <div class="block" id="box-2"></div>
    <div class="block" id="box-3"></div>
    <div class="block" id="box-4"></div>
</div>

<script>
    const pairs = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT"];

    function init() {
        pairs.forEach((sym, i) => render(i + 1, sym));
    }

    function render(id, sym) {
        const box = document.getElementById(`box-${id}`);
        // Simple Iframe - No External Scripts needed
        const url = `https://tradingview.com{sym}&interval=1&theme=dark&style=1&timezone=Asia/Karachi`;
        
        box.innerHTML = `
            <iframe src="${url}"></iframe>
            <div class="sig" id="sig-${id}">SCANNING ${sym}...</div>
        `;
    }

    function updateAsset() {
        let id = document.getElementById('b-id').value;
        let sym = document.getElementById('b-sym').value.toUpperCase().trim();
        if(sym && id <= 4) render(id, sym);
    }

    window.onload = init;
</script>
</body>
</html>
