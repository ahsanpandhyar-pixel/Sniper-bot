<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SNIPER | CLOUD SYNC</title>
    <style>
        :root { --neon: #00ff88; --bg: #05070b; --card: #0d1117; }
        body { background: var(--bg); color: #e1e1e1; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: var(--card); border: 2px solid var(--neon); border-radius: 20px; padding: 30px; margin-top: 50px; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .price { font-size: 45px; font-weight: 900; color: var(--neon); margin: 20px 0; font-family: monospace; }
        .status { font-size: 18px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body onload="startSync()">
    <div class="card">
        <div class="status" id="stat">INITIALIZING CLOUD TUNNEL...</div>
        <h2 id="sym">BTCUSDT</h2>
        <div class="price" id="p-val">0.00</div>
        <div id="sig" style="font-size:25px; font-weight:bold; margin-top:20px;">SCANNING</div>
    </div>

<script>
    let lastP = 0;
    async function fetchData() {
        try {
            // Hum aik proxy service use kar rahay hain jo Binance ko block nahi honay deti
            const url = 'https://binance.com';
            const proxyUrl = 'https://allorigins.win' + encodeURIComponent(url);
            
            const response = await fetch(proxyUrl);
            const rawData = await response.json();
            const data = JSON.parse(rawData.contents);
            
            const p = parseFloat(data.price);
            document.getElementById('p-val').innerText = p.toFixed(2);
            document.getElementById('stat').innerText = "CLOUD TUNNEL: ACTIVE ✅";
            document.getElementById('stat').style.color = "var(--neon)";

            if(lastP !== 0) {
                let diff = p - lastP;
                let s = document.getElementById('sig');
                if(Math.abs(diff) > (p * 0.00005)) {
                    s.innerText = diff > 0 ? "CALL ⬆️" : "PUT ⬇️";
                    s.style.color = diff > 0 ? "#00ff88" : "#ff4d4d";
                }
            }
            lastP = p;
        } catch (e) {
            document.getElementById('p-val').innerText = "RETRYING...";
            document.getElementById('stat').innerText = "TUNNEL BOCKED - RETRYING...";
        }
    }
    function startSync() { setInterval(fetchData, 4000); }
</script>
</body>
</html>
