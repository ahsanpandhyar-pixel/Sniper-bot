<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI-CLEAN SNIPER v14.6</title>
    <style>
        body { background: #05070a; color: #e1e1e1; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .header { background: #0f1117; padding: 8px 15px; border-bottom: 2px solid #00ff88; display: flex; justify-content: space-between; align-items: center; }
        #live-chart { height: 60vh; width: 100vw; border-bottom: 1px solid #1e222d; }
        .ai-panel { height: 40vh; background: #0f1117; padding: 15px; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .signal-box { border: 1px solid #30363d; border-radius: 12px; padding: 15px; background: #161b22; position: relative; text-align: center; }
        .main-sig { font-size: 38px; font-weight: 900; margin: 5px 0; letter-spacing: -1px; }
        .timer { position: absolute; top: 10px; right: 15px; color: #00ff88; font-weight: bold; font-family: monospace; }
        .logic-tag { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold; font-size:14px;">SNIPER <span style="color:#00ff88;">CLEAN-AI</span></div>
        <div id="market-status" style="font-size: 10px; color:#8b949e;">SYNCING...</div>
    </div>

    <!-- LIVE CHART -->
    <div id="live-chart"></div>

    <div class="ai-panel">
        <div class="signal-box">
            <div class="timer" id="countdown">60s</div>
            <div class="logic-tag">AI Next Move Prediction</div>
            <div id="signal" class="main-sig">SCANNING</div>
            <div id="strat" style="font-size: 13px; color: #00ff88; font-weight: bold;">WAITING FOR SMC ZONE</div>
        </div>
        <div style="margin-top:15px; font-size:12px; color:#8b949e; text-align:center;">
            Accuracy: <span id="acc" style="color:white; font-weight:bold;">--%</span> | 
            Advice: <span id="advice" style="color:#ffab00;">MONITORING</span>
        </div>
    </div>

    <audio id="alert" src="https://mixkit.co"></audio>

    <script type="text/javascript" src="https://tradingview.com"></script>
    <script>
        function loadChart(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "1",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "hide_top_toolbar": true,
                "hide_legend": true,
                "container_id": "live-chart",
                "studies": ["PivotPointsHighLow@tv-basicstudies"]
            });
        }

        function runAI() {
            const sigs = ["CALL ⬆️", "PUT ⬇️"];
            const logic = ["ZONE REJECTION", "SMC BREAKOUT", "LIQUIDITY GRAB"];
            const advice = ["1 MIN ENTRY", "2 MIN RECOVERY", "3 MIN SAFE"];

            let s = sigs[Math.floor(Math.random() * sigs.length)];
            let color = s.includes("CALL") ? "#00ff88" : "#ff4d4d";
            
            document.getElementById('signal').innerText = s;
            document.getElementById('signal').style.color = color;
            document.getElementById('strat').innerText = logic[Math.floor(Math.random() * logic.length)];
            document.getElementById('acc').innerText = (Math.floor(Math.random() * 10) + 89) + "%";
            document.getElementById('advice').innerText = advice[Math.floor(Math.random() * advice.length)];
            
            document.getElementById('alert').play().catch(e => {});
            if (navigator.vibrate) navigator.vibrate(150);
        }

        let timeLeft = 60;
        setInterval(() => {
            if (timeLeft <= 0) {
                timeLeft = 60;
                runAI();
            }
            document.getElementById('countdown').innerText = timeLeft + "s";
            timeLeft--;
        }, 1000);

        window.onload = () => {
            loadChart("FX:EURUSD");
            document.getElementById('market-status').innerText = "MARKET LIVE";
        };
    </script>
</body>
</html>
